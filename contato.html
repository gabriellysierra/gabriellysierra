<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600;700&family=Source+Sans+3:wght@300;400;600&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="https://use.typekit.net/sjh3ian.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/contato-layout.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!-- Preloader -->
    <div id="preloader">
        <img src="assets/img/preloader-icon.png" alt="Carregando..." class="preloader-icon">
    </div>

    <header>
        <a href="index.html" class="editorial-text-logo">GABRIELLY SIERRA</a>
        <nav>
            <ul>
                <li><a href="about.html">sobre</a></li>
                <li><a href="formacoes.html">formação</a></li>
                <li><a href="projetos-leitura.html">projetos de leitura</a></li>
                <li><a href="curadoria.html">curadoria</a></li>
                <li><a href="textos.html">textos</a></li>
                <li><a href="contato.html" class="active">contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="project-detail-main">
        <!-- INTRO SECTION -->
        <section class="editorial-intro-row">
            <div class="editorial-intro-left">
                <h1 class="editorial-main-title">CONTATO</h1>
            </div>
            <div class="editorial-intro-right">
                <p>Formações, projetos de leitura, curadoria literária e percursos em torno da literatura para as infâncias.</p>
                <p>Para conversas e propostas, entre em contato.</p>
            </div>
        </section>

        <!-- FORM SECTION -->
        <section class="contact-form-section">
            <!-- Hidden Iframe to handle redirection -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
                onload="if(submitted) {window.location='obrigado.html';}"></iframe>

            <form id="contactForm"
                action="https://forms.zohopublic.com/contatogabriel1/form/Contato/formperma/GMJWGpYTgYKd6KwMUtGMZUM0oCB4-adWJ6voo-BhVJY/htmlRecords/submit"
                method="POST" accept-charset='UTF-8' enctype='multipart/form-data' class="minimal-form"
                target="hidden_iframe" onsubmit="submitted=true;">
                <input type="hidden" name="zf_referrer_name" value="">
                <input type="hidden" name="zf_redirect_url" value="https://gabriellysierra.com.br/obrigado.html">
                <input type="hidden" name="zc_gad" value="">

                <div class="form-group">
                    <label for="name" class="minimal-label">Nome</label>
                    <input type="text" id="name" name="Name_First" class="minimal-input" required>
                </div>

                <div class="form-group">
                    <label for="email" class="minimal-label">E-mail</label>
                    <input type="email" id="email" name="Email" class="minimal-input" required>
                </div>

                <div class="form-group">
                    <label for="subject" class="minimal-label">Assunto</label>
                    <input type="text" id="subject" name="SingleLine" class="minimal-input" required>
                </div>

                <div class="form-group">
                    <label for="message" class="minimal-label">Mensagem</label>
                    <textarea id="message" name="MultiLine" rows="4" class="minimal-input" required></textarea>
                </div>

                <button type="submit" class="submit-btn">ENVIAR MENSAGEM</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-illustration">
            <img src="assets/img/dog-footer.png" alt="Ilustração" class="footer-dog">
        </div>
        <div class="social-icons">
            <a href="https://www.instagram.com/gabriellysierra/?hl=pt" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@gabrielly.sierra" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@gabriellysierra" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://www.linkedin.com/in/gabriellysierra/" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </footer>

    <script>
        var submitted = false;
    </script>
    <script src="assets/js/script.js"></script>
</body>

</html>
